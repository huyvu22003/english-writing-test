# Tự động deploy thư mục src/ lên GitHub Pages khi push lên main.
# Bật bằng: Settings → Pages → Source: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site (thư mục src)
        uses: actions/upload-pages-artifact@v3
        with:
          path: src
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
